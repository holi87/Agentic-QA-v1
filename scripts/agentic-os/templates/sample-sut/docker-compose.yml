# Wave 15 (#315 / RC gap 4) — sample SUT compose template.
#
# Copied into the repo by `agentic-os init --sample-sut`. Brings up a
# tiny static-page service that the dashboard's autonomy loop can crawl
# (web mode) and a minimal echo API the exploratory baseline can probe.
#
# Both services use ready-made public images so a fresh checkout does
# not need to build anything before `agentic-os up` works end-to-end.
version: "3.9"

services:
  sample-web:
    image: nginx:1.27-alpine
    container_name: agentic-os-sample-web
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
      interval: 5s
      timeout: 2s
      retries: 5

  sample-api:
    image: kennethreitz/httpbin:latest
    container_name: agentic-os-sample-api
    ports:
      - "127.0.0.1:8081:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/get >/dev/null"]
      interval: 5s
      timeout: 2s
      retries: 5
