openapi: 3.0.3
info:
  title: Fake Todos API
  version: 1.0.0
  description: |
    Minimal SUT for the Agentic OS RC proof fixture (issue #137).
    Five operations covering CRUD + auth so the analyser produces a
    realistic candidate-tests set without depending on a real backend.
servers:
  - url: http://127.0.0.1:8001
    description: Local fake server
paths:
  /todos:
    get:
      operationId: listTodos
      summary: List todos
      parameters:
        - name: completed
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Array of todos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Todo"
    post:
      operationId: createTodo
      summary: Create a todo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TodoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "400":
          description: Invalid payload
        "401":
          description: Missing or invalid token
  /todos/{id}:
    get:
      operationId: getTodo
      summary: Get one todo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Todo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "404":
          description: Not found
    put:
      operationId: updateTodo
      summary: Replace a todo
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TodoInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteTodo
      summary: Delete a todo
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    Todo:
      type: object
      required: [id, title, completed]
      properties:
        id:
          type: integer
        title:
          type: string
          maxLength: 200
        completed:
          type: boolean
    TodoInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 200
        completed:
          type: boolean
          default: false
